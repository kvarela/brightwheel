services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: brightwheel
      POSTGRES_USER: bw
      POSTGRES_PASSWORD: bw
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: brightwheel_test
      POSTGRES_USER: bw
      POSTGRES_PASSWORD: bw
    ports:
      - '5433:5432'

volumes:
  postgres_data:
