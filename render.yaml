services:
  - type: web
    name: api
    runtime: node
    buildCommand: yarn workspace @brightwheel/be build
    startCommand: node be/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 10y
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_STORAGE_ENDPOINT
        sync: false
      - key: RENDER_STORAGE_ACCESS_KEY
        sync: false
      - key: RENDER_STORAGE_SECRET_KEY
        sync: false
      - key: RENDER_STORAGE_BUCKET
        value: brightwheel-handbooks

  - type: web
    name: web
    runtime: static
    buildCommand: yarn workspace @brightwheel/web build
    staticPublishPath: web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: api
          type: web
          property: host

databases:
  - name: db
    databaseName: brightwheel
    plan: starter
