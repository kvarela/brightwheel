services:
  - type: web
    name: api
    runtime: node
    buildCommand: yarn install --production=false --frozen-lockfile && yarn workspace @brightwheel/be build
    startCommand: node be/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 10y
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        value: brightwheel-handbooks

  - type: web
    name: web
    runtime: static
    buildCommand: yarn install --production=false --frozen-lockfile && yarn workspace @brightwheel/web build
    staticPublishPath: web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: api
          type: web
          property: host

databases:
  - name: db
    databaseName: brightwheel
    plan: basic-256mb
